services:
  # Backend - Django API
  - type: web
    name: schoolreport-backend
    runtime: python
    region: oregon
    buildCommand: "./build.sh"
    startCommand: "gunicorn school_report_saas.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: schoolreport-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: ARKESEL_API_KEY
        sync: false
      - key: ARKESEL_SENDER_NAME
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: SUPERADMIN_FIRST_NAME
        sync: false
      - key: SUPERADMIN_LAST_NAME
        sync: false

  # Frontend - React/Vite Static Site
  - type: web
    name: schoolreport-frontend
    runtime: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: schoolreport-db
    plan: free
    databaseName: schoolreport
    user: schoolreport
